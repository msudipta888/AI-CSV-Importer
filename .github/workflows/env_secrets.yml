name: add env value

on:
  push:

env:
   GLOBAL_LEVEL_ENV: global-dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: say hello
        run: echo "Hello from github action with env"

      - name: Install
        env:
          JOB_LEVEL_ENV: job-dev
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: echo "Environment $APP_ENV set $GEMINI_API_KEY, with $GLOBAL_LEVEL_ENV"
      
      - name: Create demo file
        run: |
          echo "Hello from CI Pipeline" >  demo.txt
          echo "File craeted successfully" 

      - name: upload demo
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact-demo
          path: .